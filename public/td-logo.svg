<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1530;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0088ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Corner accent lines - top left -->
  <line x1="20" y1="20" x2="80" y2="20" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="20" y1="20" x2="20" y2="80" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Corner accent lines - top right -->
  <line x1="432" y1="20" x2="492" y2="20" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="492" y1="20" x2="492" y2="80" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Corner accent lines - bottom left -->
  <line x1="20" y1="432" x2="20" y2="492" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="20" y1="492" x2="80" y2="492" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Corner accent lines - bottom right -->
  <line x1="492" y1="432" x2="492" y2="492" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="432" y1="492" x2="492" y2="492" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Subtle diagonal tech lines -->
  <line x1="0" y1="350" x2="150" y2="512" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.08"/>
  <line x1="350" y1="0" x2="512" y2="150" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.08"/>
  <line x1="0" y1="180" x2="330" y2="512" stroke="#0066ff" stroke-width="0.8" stroke-opacity="0.06"/>

  <!-- Glow circle behind text -->
  <circle cx="256" cy="256" r="180" fill="url(#glowGrad)"/>

  <!-- T letter -->
  <text
    x="100"
    y="335"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="270"
    fill="url(#textGrad)"
    filter="url(#softGlow)"
    letter-spacing="-8"
  >TD</text>

  <!-- Thin bottom accent line -->
  <line x1="80" y1="390" x2="432" y2="390" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Small dot accents -->
  <circle cx="80" cy="390" r="3" fill="#00d4ff" fill-opacity="0.6"/>
  <circle cx="432" cy="390" r="3" fill="#00d4ff" fill-opacity="0.6"/>
</svg>
